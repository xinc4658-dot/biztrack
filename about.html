<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="BizTrack Project by Sumayyah"/>
    <meta property="og:description" content="A project born out of real small business challenges, now simplifying product, order, and finance management."/>
    <meta property="og:image:secure_url" content="https://i.imgur.com/0O47fVi.jpg"/>
    <meta property="og:url" content="https://sumusa.github.io/biztrack/"/>
    <link rel="stylesheet" href="./styles.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link rel="icon" type="image/x-icon" href="./assets/favicon.ico">
    <title data-key="page_title"></title>
</head>
<body>
    <div id="sidebar" class="sidebar">
        <div class="logo">
            <a href="./index.html">
                <i class="fas fa-b"></i>
                <span>BizTrack</span>
            </a>
            <i class="fa-solid fa-xmark" title="Close" onclick="closeSidebar()"></i>
        </div>
        <ul class="menu">
            <li>
                <a href="./index.html">
                    <i class="fa-solid fa-gauge-high"></i>
                    <span data-key="sidebar_dashboard"></span>
                </a>
            </li>
            <li>
                <a href="./products.html">
                    <i class="fas fa-dolly"></i>
                    <span data-key="sidebar_products"></span>
                </a>
            </li>
            <li>
                <a href="./orders.html">
                    <i class="fas fa-shopping-cart"></i>
                    <span data-key="sidebar_orders"></span>
                </a>
            </li>
            <li>
                <a href="./finances.html">
                    <i class="fas fa-sack-dollar"></i>
                    <span data-key="sidebar_expenses"></span>
                </a>
            </li>
            <li>
                <a href="./help.html">
                    <i class="fas fa-question-circle"></i>
                    <span data-key="sidebar_help"></span>
                </a>
            </li>
            <li class="logout active">
                <a href="./about.html">
                    <i class="fa-solid fa-users-line"></i>
                    <span data-key="sidebar_meet_dev"></span>
                </a>
            </li>
        </ul>
    </div>

    <div class="main-content">
        <div class="header-wrapper">
            <div class="menu-icon" onclick="openSidebar()">
                <i class="fa-solid fa-bars"></i>
            </div>
            <div class="header-title">
                <h2 data-key="header_welcome"></h2>
                <select id="language-select" onchange="switchLanguage(this.value)">
                    <option value="zh">中文</option>
                    <option value="en">English</option>
                </select>
            </div>
            <div class="user-info">
            </div>
        </div>

        <div class="about-container">
            <section id="using-biztrack">
                <article>
                    <h3 class="main-title" data-key="about_me_title"></h3>
                    <p data-key="about_me_intro"></p>
                </article>
                <article>
                    <p data-key="about_biztrack"></p>
                    <p data-key="about_learning"></p>
                    <p data-key="about_coach"></p>
                    <ul class="contact-icon">
                        <li>
                            <a href="https://www.linkedin.com/in/sumayyahmusa/" target="_blank">
                                <i class="fa-brands fa-linkedin"></i>
                                <span data-key="contact_linkedin"></span>
                            </a> 
                        </li>
                        <li>
                            <a href="https://github.com/sumusa/" target="_blank">
                                <i class="fa-brands fa-square-github"></i>
                                <span data-key="contact_github"></span>
                            </a> 
                        </li>
                        <li>
                            <a href="mailto:info@summeesarts.com" target="_blank">
                                <i class="fa-solid fa-envelope"></i>
                                <span data-key="contact_email"></span>
                            </a> 
                        </li>
                    </ul>
                </article>
            </section>
        </div>
    </div>
    
    <!-- 引入语言模块 -->
    <script src="./lang.js"></script>
    <script src="./help.js"></script>
</body>
</html>
