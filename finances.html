<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://cdnjs.cloudflare.com https://fonts.gstatic.com; connect-src 'self' https://*.firebaseio.com https://*.googleapis.com; img-src 'self' data:;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="BizTrack Project by Sumayyah"/>
    <meta property="og:description" content="A project born out of real small business challenges, now simplifying product, order, and finance management."/>
    <meta property="og:image:secure_url" content="https://i.imgur.com/0O47fVi.jpg"/>
    <meta property="og:url" content="https://sumusa.github.io/biztrack/"/>
    <link rel="stylesheet" href="./styles.css"/>
        <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap"></noscript>
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"></noscript>
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"></noscript>
    <link rel="icon" type="image/x-icon" href="./assets/favicon.ico">
    <title>Expenses - BizTrack</title>
</head>
<body class="finances-page">
    <nav id="sidebar" class="sidebar" aria-label="Main navigation">
        <div class="logo">
            <a href="./index.html">
                <i class="fas fa-b"></i>
                <span>BizTrack</span>
            </a>
            <i class="fa-solid fa-xmark" title="Close" onclick="closeSidebar()"></i>
        </div>
        <ul class="menu">
            <li>
                <a href="./index.html">
                    <i class="fa-solid fa-gauge-high"></i>
                    <span data-i18n="sidebar.dashboard">Dashboard</span>
                </a>
            </li>
            <li>
                <a href="./products.html">
                    <i class="fas fa-dolly"></i>
                    <span data-i18n="sidebar.products">Products</span>
                </a>
            </li>
            <li>
                <a href="./orders.html">
                    <i class="fas fa-shopping-cart"></i>
                    <span data-i18n="sidebar.orders">Orders</span>
                </a>
            </li>
            <li class="active">
                <a href="./finances.html">
                    <i class="fas fa-sack-dollar"></i>
                    <span data-i18n="sidebar.expenses">Expenses</span>
                </a>
            </li>
            <li>
                <a href="./balance.html">
                    <i class="fas fa-scale-balanced"></i>
                    <span data-i18n="sidebar.balance">Balance</span>
                </a>
            </li>
            <li>
                <a href="./history.html">
                    <i class="fa-solid fa-clock-rotate-left"></i>
                    <span data-i18n="sidebar.history">History</span>
                </a>
            </li>
            <li>
                <a href="./help.html">
                    <i class="fas fa-question-circle"></i>
                    <span data-i18n="sidebar.help">Help</span>
                </a>
            </li>
            <li class="logout">
                <a href="./about.html">
                    <i class="fa-solid fa-users-line"></i>
                    <span data-i18n="sidebar.meetDeveloper">Meet the Developer</span>
                </a>
            </li>
        </ul>
    </nav>

    <main class="main-content">
        <div class="header-wrapper">
            <button class="menu-icon" onclick="openSidebar()" aria-label="Open sidebar menu">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div class="header-title">
                <!-- <span>Primary</span> -->
                <h2 data-i18n="sidebar.expenses">Expenses</h2>
            </div>
            <div class="user-info">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="search" id="searchInput" placeholder="Search" data-i18n-placeholder="common.search">
                </div>
                <div class="language-switcher">
                    <select id="languageSelector" aria-label="Select language">
                        <option value="en">English</option>
                        <option value="zh">中文</option>
                        <option value="zhTW">繁體中文</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="table-wrapper">
            <div class="product-title">
                <h1 class="main-title" data-i18n="sidebar.expenses">Expenses</h1>
                <div class="finance-button">
                    <button class="add-button" onclick="openForm()" data-i18n="expenses.addExpense">Add Expense</button>
                    <button class="download-button" onclick="exportToCSV()" data-i18n="expenses.exportCSV">Export to CSV</button>
                </div>
            </div>

            <div class="form-popup">
                <form class="form-container" id="transaction-form" novalidate>
                    <div class="form-columns">
                            <input type="hidden" id="tr-id">
                            <label for="tr-date"><b data-i18n="expenses.date">Date: </b></label>
                            <input type="text" id="tr-date" placeholder="YYYY-MM-DD" required>

                            <label for="tr-category"><b data-i18n="expenses.category">Category: </b></label>
                            <select name="tr-category" id="tr-category" required>
                                <option value="" disabled selected hidden data-i18n="expenses.chooseCategory">Choose an expense category</option>
                                <option value="Rent" data-i18n="expenses.rent">Rent</option>
                                <option value="Utilities" data-i18n="expenses.utilities">Utilities</option>
                                <option value="Supplies" data-i18n="expenses.supplies">Supplies</option>
                                <option value="Order Fulfillment" data-i18n="expenses.orderFulfillment">Order Fulfillment</option>
                                <option value="Miscellaneous" data-i18n="expenses.miscellaneous">Miscellaneous</option>
                            </select>

                            <label for="tr-amount"><b data-i18n="expenses.amount">Amount: </b></label>
                            <input type="number" id="tr-amount" placeholder="$0.00" min="0.00" max="10000.00" step="0.01" required>

                            <label for="tr-notes"><b data-i18n="expenses.notes">Notes: </b></label>
                            <input type="text" id="tr-notes" data-i18n-placeholder="expenses.notesPlaceholder" placeholder="Power bill" required>
                    </div>
                    
                    <div class="button-col">
                        <button type="button" class="btn" id="submitBtn" data-i18n="expenses.add" onclick="addOrUpdate(event)">Add</button>
                        <button type="button" class="btn cancel" onclick="closeForm()" data-i18n="expenses.cancel">Cancel</button>
                    </div>
                </form>
            </div>

            <div class="table-container">
                <table id="finance-table">
                    <thead>
                        <tr>
                            <th onclick="sortTable('trID')">S/N</th>
                            <th onclick="sortTable('trDate')" data-i18n="expenses.date">Date</th>
                            <th onclick="sortTable('trCategory')" data-i18n="expenses.category">Expense Category</th>
                            <th onclick="sortTable('trAmount')" data-i18n="expenses.amount">Amount</th>
                            <th onclick="sortTable('trNotes')" data-i18n="expenses.notes">Notes</th>
                            <th data-i18n="common.action">Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                    <tfoot>
                        <tr>
                            <td colspan="6">
                                <div id="total-expenses"></div>
                            </td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="./firebase.js"></script>
    <script type="module" src="./i18n/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/zh.js"></script>
    <script type="module" src="./finances.js"></script>
</body>
</html>
