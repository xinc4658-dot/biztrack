<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width", initial-scale=1.0">
    <meta property="og:title" content="BizTrack Project by Sumayyah"/>
    <meta property="og:description" content="A project born out of real small business challenges, now simplifying product, order, and finance management."/>
    <meta property="og:image:secure_url" content="https://i.imgur.com/0O47fVi.jpg"/>
    <meta property="og:url" content="https://sumusa.github.io/biztrack/"/>
    <link rel="stylesheet" href="./styles.css"/>
        <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap"></noscript>
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"></noscript>
    <link rel="icon" type="image/x-icon" href="./assets/favicon.ico">
    <title>Products - BizTrack</title>
</head>
<body>
    <div id="sidebar" class="sidebar">
        <div class="logo">
            <a href="./index.html">
                <i class="fas fa-b"></i>
                <span>BizTrack</span>
            </a>
            <i class="fa-solid fa-xmark" title="Close" onclick="closeSidebar()"></i>
        </div>
        <ul class="menu">
            <li>
                <a href="./index.html">
                    <i class="fa-solid fa-gauge-high"></i>
                    <span data-i18n="sidebar.dashboard">Dashboard</span>
                </a>
            </li>
            <li class="active">
                <a href="./products.html">
                    <i class="fas fa-dolly"></i>
                    <span data-i18n="sidebar.products">Products</span>
                </a>
            </li>
            <li>
                <a href="./orders.html">
                    <i class="fas fa-shopping-cart"></i>
                    <span data-i18n="sidebar.orders">Orders</span>
                </a>
            </li>
            <li>
                <a href="./finances.html">
                    <i class="fas fa-sack-dollar"></i>
                    <span data-i18n="sidebar.expenses">Expenses</span>
                </a>
            </li>
            <li>
                <a href="./help.html">
                    <i class="fas fa-question-circle"></i>
                    <span data-i18n="sidebar.help">Help</span>
                </a>
            </li>
            <li class="logout">
                <a href="./about.html">
                    <i class="fa-solid fa-users-line"></i>
                    <span data-i18n="sidebar.meetDeveloper">Meet the Developer</span>
                </a>
            </li>
        </ul>
    </div>

    <div class="main-content">
        <div class="header-wrapper">
            <div class="menu-icon" onclick="openSidebar()">
                <i class="fa-solid fa-bars"></i>
            </div>
            <div class="header-title">
                <h2 data-i18n="sidebar.products">Products</h2>
            </div>
            <div class="user-info">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="search" id="searchInput" placeholder="Search" data-i18n-placeholder="common.search">
                </div>
                <div class="language-switcher">
                    <select id="languageSelector">
                        <option value="en">English</option>
                        <option value="zh">中文</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="table-wrapper">
            <div class="product-title">
                <h3 class="main-title" data-i18n="sidebar.products">Products</h3>
                <div class="product-button">
                    <button class="add-button" onclick="openForm()" data-i18n="products.addProduct">Add Product</button>
                    <button class="download-button" onclick="exportToCSV()" data-i18n="products.downloadCSV">Download CSV</button>
                </div>
            </div>
            <div class="form-popup">
                <form class="form-container" id="product-form" onsubmit="addOrUpdate(event)">
                    <div class="form-columns">
                        <div class="first-col">
                            <label for="product-id"><b data-i18n="products.productId">Product ID: </b></label>
                            <input type="text" id="product-id" placeholder="PD001" required>
                        
                            <label for="product-name"><b data-i18n="products.productName">Product Name:</b></label>
                            <select name="product-name" id="product-name" required>
                                <option value="" disabled selected hidden data-i18n="products.chooseProduct">Choose a product</option>
                                <optgroup label="Hats" data-i18n="products.hats">
                                    <option value="Baseball caps" data-i18n="products.baseballCaps">Baseball caps</option>
                                    <option value="Snapbacks" data-i18n="products.snapbacks">Snapbacks</option>
                                    <option value="Beanies" data-i18n="products.beanies">Beanies</option>
                                    <option value="Bucket hats" data-i18n="products.bucketHats">Bucket hats</option>
                                </optgroup>
                                <optgroup label="Drinkware" data-i18n="products.drinkware">
                                    <option value="Mugs" data-i18n="products.mugs">Mugs</option>
                                    <option value="Water bottles" data-i18n="products.waterBottles">Water bottles</option>
                                    <option value="Tumblers" data-i18n="products.tumblers">Tumblers</option>
                                </optgroup>   
                                <optgroup label="Clothing" data-i18n="products.clothing">
                                    <option value="T-shirts" data-i18n="products.tshirts">T-shirts</option>
                                    <option value="Sweatshirts" data-i18n="products.sweatshirts">Sweatshirts</option>
                                    <option value="Hoodies" data-i18n="products.hoodies">Hoodies</option>
                                </optgroup>   
                                <optgroup label="Accessories" data-i18n="products.accessories">
                                    <option value="Pillow cases" data-i18n="products.pillowCases">Pillow cases</option>
                                    <option value="Tote bags" data-i18n="products.toteBags">Tote bags</option>
                                    <option value="Stickers" data-i18n="products.stickers">Stickers</option>
                                </optgroup>   
                                <optgroup label="Home decor" data-i18n="products.homeDecor">
                                    <option value="Posters" data-i18n="products.posters">Posters</option>
                                    <option value="Framed posters" data-i18n="products.framedPosters">Framed posters</option>
                                    <option value="Canvas prints" data-i18n="products.canvasPrints">Canvas prints</option>
                                </optgroup>
                            </select>
    
                            <label for="product-desc"><b data-i18n="products.productDesc">Product Description:</b></label>
                            <input type="text" id="product-desc" placeholder="Travel Mug" data-i18n-placeholder="products.productDescPlaceholder" required>
                        </div>

                        <div class="second-col">
                            <label for="product-cat"><b data-i18n="products.productCategory">Product Category:</b></label>
                            <select name="product-cat" id="product-cat" required>
                                <option value="" disabled selected data-i18n="products.chooseCategory">Choose a category</option>
                                <option value="Clothing" data-i18n="products.clothing">Clothing</option>
                                <option value="Drinkware" data-i18n="products.drinkware">Drinkware</option>
                                <option value="Accessories" data-i18n="products.accessories">Accessories</option>
                                <option value="Hats" data-i18n="products.hats">Hats</option>
                                <option value="Home decor" data-i18n="products.homeDecor">Home decor</option>
                            </select>
    
                            <label for="product-price"><b data-i18n="products.productPrice">Product Price:</b></label>
                            <input type="number" id="product-price" placeholder="$0.00" min="0.00" max="10000.00" step="0.01" required>
    
                            <label for="product-sold"><b data-i18n="products.productSold">Number of Units Sold:</b></label>
                            <input type="number" id="product-sold" placeholder="10" required>
                        </div>
                    </div>
                    
                    <div class="button-col">
                        <button type="submit" class="btn" id="submitBtn" data-i18n="products.save">Add</button>
                        <button type="button" class="btn cancel" onclick="closeForm()" data-i18n="products.cancel">Cancel</button>
                    </div>
                </form>
            </div>
            <div class="table-container">
                <table id="product-table">
                    <thead>
                        <tr>
                            <th onclick="sortTable('prodID')" data-i18n="products.productId">Product ID</th>
                            <th onclick="sortTable('prodName')" data-i18n="products.productName">Product Name</th>
                            <th onclick="sortTable('prodDesc')" data-i18n="products.productDesc">Description</th>
                            <th onclick="sortTable('prodCat')" data-i18n="products.productCategory">Category</th>
                            <th onclick="sortTable('prodPrice')" data-i18n="products.productPrice">Price</th>
                            <th onclick="sortTable('prodSold')" data-i18n="products.productSold">Units Sold</th>
                            <th data-i18n="common.action">Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="./js/i18n.js"></script>
    <script src="./products.js"></script>
</body>
</html>
